# Configuration for the MLB forecaster.
# All tunables live here so the model can be calibrated without code edits.

data:
  # Where cached/processed/output artifacts live (relative to repo root).
  raw_dir: data/raw
  processed_dir: data/processed
  features_dir: data/features
  models_dir: data/models
  output_dir: data/output
  # Seasons to pull/train on by default: the full 30-team era (1998-present).
  # 1998 is when MLB reached its current 30-team alignment; the API has complete
  # schedules and pitcher box scores from here on. Override per command with
  # --seasons. (Pre-1998 has fewer/different teams and spottier data.)
  default_seasons: [1998, 1999, 2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007,
                    2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017,
                    2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
  # Optional Google Cloud Storage sink. When gcs_bucket is set (or the env var
  # MLB538_GCS_BUCKET is present), scraping also uploads each season's processed
  # data as Parquet to gs://<bucket>/<prefix>/processed/ for BigQuery ingestion.
  gcs_bucket: null
  gcs_prefix: mlb538

api:
  base_url: https://statsapi.mlb.com/api
  sport_id: 1            # 1 = MLB
  request_timeout: 30    # seconds
  max_retries: 4
  backoff_factor: 0.5    # exponential backoff base (seconds)
  cache_enabled: true

elo:
  # Starting (initial) values; the *_bounds are search ranges used by `fit-elo`.
  mean_rating: 1500.0
  k_factor: 4.0
  home_field_adv: 24.0          # Elo points
  mov_alpha: 2.2                # margin-of-victory multiplier shape
  mov_autocorr: 0.001           # autocorrelation damping coefficient
  pitcher_weight: 1.0           # scales pitcher_adj contribution
  pitcher_rolling_window: 10    # starts used for rolling game score
  pitcher_recency_decay: 0.85   # geometric decay (most recent start weighted highest)
  pitcher_adj_cap: 50.0         # max |Elo| swing from a single starter
  preseason_reversion: 0.33     # fraction reverted toward mean_rating between seasons
  rest_advantage: 0.0           # Elo points per rest-day differential (fit if enabled)

  fit:
    # Bounds for scipy optimization (min, max). Only listed params are fit.
    k_factor: [1.0, 12.0]
    home_field_adv: [0.0, 60.0]
    mov_alpha: [0.5, 5.0]
    mov_autocorr: [0.0, 0.01]
    pitcher_weight: [0.0, 2.0]
    preseason_reversion: [0.0, 0.8]
    maxiter: 200

# ── MODEL TINKERING ──────────────────────────────────────────────────────────
# The `features` and `ml` blocks below are the LIVE model settings — the values
# here are the current best-known combination. To trial alternatives WITHOUT
# editing this file, add a named preset to experiments.yaml and run:
#
#     mlbfc compare            # ranks all presets by walk-forward CV log loss
#
# experiments.yaml also records the top combinations so far so you can always
# revert to a known-good baseline. To adopt a winning preset, copy its settings
# into the blocks below and run `mlbfc train`.
# ─────────────────────────────────────────────────────────────────────────────

features:
  # Each include flag toggles a feature GROUP on/off. Turning one off shrinks the
  # model input; use `mlbfc compare` with a preset that flips a flag to measure
  # whether a group actually helps (ablation).
  recent_form_window: 10        # games in the rolling form window; larger = smoother/slower-reacting
  include:
    elo_diff: true              # Elo & rating point differential (the core signal)
    team_ratings: true          # raw pre-game Elo of each side
    pitcher_adj: true           # starting-pitcher Elo adjustment + its differential
    pitcher_rgs: true           # starting-pitcher rolling game score
    rest_days: true             # days of rest per side + differential
    recent_form: true           # rolling run-diff & win pct (uses recent_form_window)
    month: true                 # calendar month (weak seasonality signal)
    playoff: true               # playoff-game flag

ml:
  # Walk-forward (expanding-window) cross-validation by season: train on seasons
  # < Y, test on Y. This is also the scoring used by `mlbfc compare`.
  cv:
    scheme: expanding_by_season
    min_train_seasons: 2        # prior seasons required before a season is scored
  # Logistic regression (the currently SELECTED family). C is inverse L2 strength:
  # lower = MORE regularization (simpler), higher = less. Useful range ~0.1–10.
  logistic:
    C: 1.0
    max_iter: 1000              # solver iterations; raise only if convergence warns
  # LightGBM (gradient-boosted trees). The knobs below trade capacity vs.
  # overfitting — MLB is noisy, so the defaults stay deliberately conservative.
  lightgbm:
    n_estimators: 400           # number of boosting rounds (more = higher capacity)
    learning_rate: 0.03         # smaller = slower/steadier learning (pair with more rounds)
    num_leaves: 31              # tree complexity; lower fights overfitting
    max_depth: -1               # -1 = unbounded depth
    subsample: 0.8              # row sampling per round (bagging)
    colsample_bytree: 0.8       # feature sampling per tree
    min_child_samples: 50       # min rows per leaf; higher = stronger regularization
    reg_lambda: 1.0             # L2 penalty on leaf weights
  # Probability calibration. sigmoid is best for MLB — isotonic OVERFIT and cost
  # ~0.02 log loss in testing. one of: isotonic | sigmoid | none.
  calibration: sigmoid
  margin:
    enabled: true               # train a run-margin regression model alongside the classifier
    ridge_alpha: 1.0            # L2 strength for the ridge margin model (higher = smoother)

forecast:
  n_sims: 10000
  random_seed: 538
  win_prob_source: classifier   # classifier | margin (which model drives game probabilities)
  # Current MLB playoff format (per league): 3 division winners + 3 wild cards.
  division_winners_per_league: 3
  wild_cards_per_league: 3

selfcorrect:
  retrain_every_days: 7     # cadence for refitting the ML layer
  refit_elo_every_days: 30  # cadence for re-optimizing Elo hyperparameters
  rolling_train_seasons: 5  # rolling window size for retrains
